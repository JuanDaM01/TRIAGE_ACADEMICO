version: '3.8'

services:
  db:
    image: mariadb:10.11
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: triage
      MYSQL_USER: triage_user
      MYSQL_PASSWORD: 123456
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

  backend:
    build: .
    depends_on:
      - db
    environment:
      SPRING_DATASOURCE_URL: jdbc:mariadb://db:3306/triage
      SPRING_DATASOURCE_USERNAME: triage_user
      SPRING_DATASOURCE_PASSWORD: 123456
    ports:
      - "8080:8080"
    restart: unless-stopped

volumes:
  db_data:
