<header class="sticky top-0 w-full z-40 bg-[#f6faf9]/80 dark:bg-[#181c1c]/80 backdrop-blur-xl border-b border-[#bec9c5]/20 shadow-sm transition-all duration-300 h-20 flex-shrink-0">
    <div class="flex justify-between items-center px-6 md:px-12 py-4 w-full h-full">

        <div class="flex-grow max-w-md hidden lg:block">
            <div class="relative group">
                <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-[#3e4946]/60 group-focus-within:text-[#004f45] transition-colors">search</span>
                <input
    class="w-full bg-[#ebefee]/50 border border-[#bec9c5]/30 text-[#181c1c] text-sm rounded-full pl-10 pr-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-[#004f45]/20 focus:border-[#004f45] focus:bg-white transition-all duration-300 placeholder:text-[#3e4946]/50 backdrop-blur-sm"
    placeholder="Buscar solicitudes, trámites o usuarios..."
    type="text"
    [value]="searchTerm"
    (input)="onSearchInput($any($event.target).value)"
/>
            </div>
        </div>

        <div class="md:hidden flex items-center gap-3">
            <button
                type="button"
                (click)="menuToggle.emit()"
                class="p-2 text-[#3e4946] hover:text-[#004f45] transition-colors rounded-lg hover:bg-[#ebefee]"
            >
                <span class="material-symbols-outlined">menu</span>
            </button>
            <span class="font-bold text-lg text-[#181c1c] dark:text-white">Triage Académico</span>
        </div>

        <div class="flex items-center gap-3 md:gap-6 ml-auto">

            <div class="flex items-center gap-2">
                <button
                    type="button"
                    class="relative p-2 text-[#3e4946] hover:text-[#004f45] transition-colors rounded-full hover:bg-[#ebefee] focus:outline-none focus:ring-2 focus:ring-[#004f45]/20"
                >
                    <span class="material-symbols-outlined text-[24px]">notifications</span>
                    <span class="absolute top-1.5 right-1.5 w-2 h-2 bg-[#ba1a1a] rounded-full border-2 border-[#f6faf9]"></span>
                </button>

                <div class="h-8 w-px bg-[#bec9c5]/30 mx-2 hidden sm:block"></div>

                <div class="flex items-center gap-3 group select-none">
                    <div class="hidden sm:block text-right">
                        <p class="text-sm font-semibold text-[#181c1c]">{{ currentUser?.nombre }} {{ currentUser?.apellido }}</p>
                        <p class="text-[10px] text-[#3e4946] leading-none mt-0.5 font-bold uppercase tracking-wider">{{ getRolLabel() }}</p>
                    </div>
                    <div class="w-10 h-10 rounded-full border-2 border-[#e5e9e8] bg-[#004f45] text-white font-bold flex items-center justify-center shadow-sm">
                        {{ currentUser?.nombre?.charAt(0) ?? '?' }}{{ currentUser?.apellido?.charAt(0) ?? '' }}
                    </div>
                </div>
            </div>
        </div>
    </div>
</header>
