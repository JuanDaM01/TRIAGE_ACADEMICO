<!-- LOADING -->
<div *ngIf="loadingDetalle" class="space-y-4 animate-pulse w-full font-['Inter']">
  <div class="h-32 bg-white/40 rounded-3xl"></div>
  <div class="h-64 bg-white/30 rounded-2xl"></div>
</div>

<!-- CONTENIDO -->
<div *ngIf="!loadingDetalle && solicitud" class="w-full pb-12 font-['Inter'] space-y-5">

  <!-- HEADER -->
  <div class="relative overflow-hidden rounded-3xl bg-white/40 backdrop-blur-xl border border-white/60 shadow-[0_8px_32px_0_rgba(0,79,69,0.05)] p-8">
    <div class="absolute top-0 right-0 w-56 h-56 bg-gradient-to-br from-[#84d5c5]/30 to-transparent rounded-full blur-3xl -translate-y-1/2 translate-x-1/3 pointer-events-none"></div>
    <div class="relative z-10 flex justify-between items-start gap-4">
      <div>
        <h2 class="text-2xl font-black text-[#004f45] flex items-center gap-2 mb-1">
          <span class="material-symbols-outlined text-[28px]">edit_note</span>
          Clasificación Manual
        </h2>
        <p class="text-xs text-[#3e4946]/50 font-medium">Solicitud #{{ solicitud.id }} · {{ solicitud.tipoSolicitud }}</p>
        <p class="text-sm text-[#3e4946]/70 mt-2 leading-relaxed line-clamp-2">{{ solicitud.descripcion }}</p>
      </div>
      <button (click)="volver()"
        class="shrink-0 flex items-center gap-1.5 text-xs font-bold text-[#004f45] bg-white/60 px-3 py-2 rounded-xl border border-white shadow-sm hover:bg-white/90 transition-all">
        <span class="material-symbols-outlined text-[15px]">arrow_back</span> Volver
      </button>
    </div>
  </div>

  <!-- ERROR -->
  <div *ngIf="errorMessage" class="bg-[#fee2e2] border border-[#fca5a5] rounded-2xl px-5 py-4 text-sm text-[#93000a] font-medium flex items-center gap-2">
    <span class="material-symbols-outlined text-[18px]">error</span>
    {{ errorMessage }}
  </div>

  <!-- FORMULARIO -->
  <div class="bg-white/50 backdrop-blur-lg rounded-2xl border border-white/50 p-6">
    <p class="text-[10px] font-black text-[#3e4946]/50 uppercase tracking-widest mb-5 flex items-center gap-1.5">
      <span class="material-symbols-outlined text-[14px]">tune</span>
      Define los parámetros de clasificación
    </p>

    <form [formGroup]="clasificarForm" (ngSubmit)="clasificarManual()" class="space-y-5">

      <!-- Tipo de solicitud -->
      <div>
        <label class="text-[10px] font-black text-[#3e4946]/50 uppercase tracking-widest block mb-2">
          Tipo de solicitud <span class="text-[#93000a]">*</span>
        </label>
        <select formControlName="tipoSolicitud"
          class="w-full bg-white/70 border border-white/60 rounded-xl px-4 py-2.5 text-sm font-medium text-[#181c1c] focus:outline-none focus:ring-2 focus:ring-[#004f45]/30">
          <option value="">Selecciona un tipo</option>
          <option *ngFor="let tipo of tiposSolicitud" [value]="tipo">{{ tipo }}</option>
        </select>
      </div>

      <!-- Nivel de prioridad -->
      <div>
        <label class="text-[10px] font-black text-[#3e4946]/50 uppercase tracking-widest block mb-2">
          Nivel de prioridad <span class="text-[#93000a]">*</span>
        </label>
        <div class="grid grid-cols-4 gap-2">
          <label *ngFor="let nivel of nivelesPrioridad" class="cursor-pointer">
            <input type="radio" formControlName="nivelPrioridad" [value]="nivel" class="sr-only peer">
            <div class="text-center py-2.5 rounded-xl border-2 text-xs font-bold transition-all
              peer-checked:border-[#004f45] peer-checked:bg-[#004f45] peer-checked:text-white
              border-transparent hover:border-white/80"
              [ngClass]="clasificarForm.get('nivelPrioridad')?.value === nivel ? '' : getNivelColor(nivel)">
              {{ nivel }}
            </div>
          </label>
        </div>
      </div>

      <!-- Fecha límite -->
      <div>
        <label class="text-[10px] font-black text-[#3e4946]/50 uppercase tracking-widest block mb-2">
          Fecha límite <span class="text-[#3e4946]/30 font-normal normal-case">(opcional)</span>
        </label>
        <input type="date" formControlName="fechaLimite"
          class="w-full bg-white/70 border border-white/60 rounded-xl px-4 py-2.5 text-sm text-[#181c1c] focus:outline-none focus:ring-2 focus:ring-[#004f45]/30">
      </div>

      <!-- Submit -->
      <button type="submit" [disabled]="clasificarForm.invalid || loadingClasificar"
        class="w-full flex items-center justify-center gap-2 bg-[#004f45] hover:bg-[#003d35] text-white font-bold text-sm py-3 rounded-2xl transition-all shadow-sm hover:shadow disabled:opacity-50 disabled:cursor-not-allowed">
        <span *ngIf="!loadingClasificar" class="material-symbols-outlined text-[18px]">check_circle</span>
        <span *ngIf="loadingClasificar" class="animate-spin material-symbols-outlined text-[18px]">progress_activity</span>
        {{ loadingClasificar ? 'Clasificando...' : 'Confirmar clasificación' }}
      </button>

    </form>
  </div>

</div>
