<!-- ═══════ LOADING ═══════ -->
<div *ngIf="loading" class="space-y-4 pb-12 font-['Inter'] w-full max-w-2xl mx-auto">
  <div class="animate-pulse space-y-4">
    <div class="h-24 bg-white/40 rounded-3xl"></div>
    <div class="h-64 bg-white/30 rounded-2xl"></div>
  </div>
</div>

<!-- ═══════ CLASIFICAR ═══════ -->
<div *ngIf="!loading && solicitud" class="pb-12 font-['Inter'] w-full max-w-2xl mx-auto">

  <!-- ── HEADER ── -->
  <div class="relative overflow-hidden rounded-3xl bg-white/40 dark:bg-black/20 backdrop-blur-xl border border-white/60 dark:border-white/10 shadow-[0_8px_32px_0_rgba(0,79,69,0.05)] p-8 mb-6">
    <div class="absolute top-0 right-0 w-48 h-48 bg-gradient-to-br from-[#84d5c5]/30 to-[#dded49]/20 rounded-full blur-3xl -translate-y-1/2 translate-x-1/3 pointer-events-none"></div>
    <div class="relative z-10 flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
      <div>
        <h2 class="text-2xl font-black text-[#004f45] dark:text-[#84d5c5] mb-1 flex items-center gap-3">
          <span class="material-symbols-outlined text-[28px]">category</span>
          Clasificar solicitud #{{ solicitud.id }}
        </h2>
        <p class="text-sm text-[#3e4946]/70 dark:text-white/60">
          {{ solicitud.tipoSolicitud }} · {{ solicitud.canalOrigen }} · {{ solicitud.fechaCreacion | date:'d MMM yyyy':'':'es' }}
        </p>
      </div>
      <button (click)="volver()"
        class="flex items-center gap-2 text-xs font-bold text-[#004f45] dark:text-[#84d5c5] bg-white/60 dark:bg-[#181c1c]/60 px-4 py-2.5 rounded-xl border border-white dark:border-[#3e4946]/20 shadow-sm hover:bg-white/90 transition-all shrink-0">
        <span class="material-symbols-outlined text-[15px]">arrow_back</span>
        Volver al detalle
      </button>
    </div>
  </div>

  <!-- ── FORMULARIO ── -->
  <div class="bg-white/50 dark:bg-[#181c1c]/30 backdrop-blur-lg rounded-2xl border border-white/50 dark:border-white/10 p-8 space-y-6">

    <!-- Tipo de solicitud -->
    <div>
      <label class="text-[10px] font-black text-[#3e4946]/50 uppercase tracking-widest mb-1.5 block">
        Tipo de solicitud
      </label>
      <select [(ngModel)]="form.tipoSolicitud"
        class="w-full bg-[#ebefee]/50 border border-[#bec9c5]/30 text-[#181c1c] text-sm rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-[#004f45]/20 focus:border-[#004f45] transition-all">
        <option value="" disabled>Selecciona un tipo...</option>
        <option *ngFor="let tipo of tiposSolicitud" [value]="tipo">{{ tipo }}</option>
      </select>
    </div>

    <!-- Nivel de prioridad -->
    <div>
      <label class="text-[10px] font-black text-[#3e4946]/50 uppercase tracking-widest mb-1.5 block">
        Nivel de prioridad
      </label>
      <div class="grid grid-cols-2 sm:grid-cols-4 gap-3">
        <label *ngFor="let nivel of nivelesPrioridad"
          class="relative cursor-pointer">
          <input type="radio" [(ngModel)]="form.nivelPrioridad" [value]="nivel" class="sr-only peer" />
          <div class="w-full text-center py-2.5 px-3 rounded-xl border-2 text-xs font-bold uppercase tracking-wider transition-all peer-checked:border-[#004f45] peer-checked:bg-[#004f45] peer-checked:text-white border-[#bec9c5]/40 text-[#3e4946]/60 hover:border-[#004f45]/40"
            [class.peer-checked:bg-[#ba1a1a]]="nivel === 'CRITICA'"
            [class.peer-checked:border-[#ba1a1a]]="nivel === 'CRITICA'">
            {{ nivel }}
          </div>
        </label>
      </div>
    </div>

    <!-- Fecha límite -->
    <div>
      <label class="text-[10px] font-black text-[#3e4946]/50 uppercase tracking-widest mb-1.5 block">
        Fecha límite
      </label>
      <input
        type="date"
        [(ngModel)]="form.fechaLimite"
        [min]="today"
        class="w-full bg-[#ebefee]/50 border border-[#bec9c5]/30 text-[#181c1c] text-sm rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-[#004f45]/20 focus:border-[#004f45] transition-all" />
    </div>

    <!-- Justificación -->
    <div>
      <label class="text-[10px] font-black text-[#3e4946]/50 uppercase tracking-widest mb-1.5 block">
        Justificación <span class="font-normal normal-case tracking-normal">(opcional)</span>
      </label>
      <textarea [(ngModel)]="form.justificacion"
        rows="4"
        placeholder="Describe el motivo de la clasificación..."
        class="w-full bg-[#ebefee]/50 border border-[#bec9c5]/30 text-[#181c1c] text-sm rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-[#004f45]/20 focus:border-[#004f45] transition-all resize-none">
      </textarea>
    </div>

    <!-- Botones -->
    <div class="flex gap-3 pt-2">
      <button (click)="volver()"
        class="flex-1 py-3 rounded-2xl border border-[#bec9c5]/40 text-[#3e4946] text-sm font-semibold hover:bg-[#ebefee] transition-all">
        Cancelar
      </button>
      <button (click)="confirmar()"
        [disabled]="!formularioValido || clasificando"
        class="flex-1 py-3 rounded-2xl bg-[#dded49] hover:bg-[#c1d02c] text-[#1a1d00] text-sm font-bold transition-all disabled:opacity-40 disabled:cursor-not-allowed flex items-center justify-center gap-2">
        <span *ngIf="clasificando" class="material-symbols-outlined text-[16px] animate-spin">progress_activity</span>
        {{ clasificando ? 'Clasificando...' : 'Confirmar clasificación' }}
      </button>
    </div>

  </div>
</div>
