<div class="historial-container">
    <div class="header">
        <h1>Historial de Solicitud #{{ solicitudId }}</h1>
        <a [routerLink]="['/app/solicitudes', solicitudId]" class="back-link">
            ← Volver al detalle
        </a>
    </div>

    <div *ngIf="loading" class="loading">
        <p>Cargando historial...</p>
    </div>

    <div *ngIf="errorMessage" class="error">
        <p>{{ errorMessage }}</p>
    </div>

    <div *ngIf="!loading && !errorMessage && historial.length === 0" class="empty">
        <p>No hay historial disponible para esta solicitud.</p>
    </div>

    <div *ngIf="!loading && !errorMessage && historial.length > 0" class="historial-list">
        <div *ngFor="let item of historial" class="historial-item">
            <div class="historial-header">
                <span class="accion-badge">{{ item.accion | accion }}</span>
                <span class="fecha">{{ formatearFecha(item.fechaHoraAccion) }}</span>
            </div>

            <div class="historial-content">
                <p class="usuario" *ngIf="item.usuarioId">
                    <strong>Usuario ID:</strong> {{ item.usuarioId }}
                </p>

                <p *ngIf="item.observacion" class="observaciones">
                    <strong>Observación:</strong> {{ item.observacion }}
                </p>
            </div>
        </div>
    </div>
</div>
