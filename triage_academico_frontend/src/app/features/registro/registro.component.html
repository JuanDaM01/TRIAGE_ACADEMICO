<div class="registro-container">
    <div class="registro-card">
        <div class="registro-header">
            <h1>Crear Cuenta</h1>
            <p>Registro de Usuario</p>
        </div>

        <form [formGroup]="registroForm" (ngSubmit)="onSubmit()">

            <div class="form-row">
                <div class="form-group">
                    <label>Nombre</label>
                    <input type="text" formControlName="nombre" class="form-control">
                </div>
                <div class="form-group">
                    <label>Apellido</label>
                    <input type="text" formControlName="apellido" class="form-control">
                </div>
            </div>

            <div class="form-group">
                <label>Correo Electrónico</label>
                <input type="email" formControlName="email" class="form-control">
            </div>

            <div class="form-group">
                <label>Contraseña</label>
                <input type="password" formControlName="password" class="form-control">
            </div>

            <div class="form-group">
                <label>Rol</label>
                <select formControlName="rol" class="form-control">
                    <option *ngFor="let rol of rolesDisponibles" [value]="rol.value">
                        {{ rol.label }}
                    </option>
                </select>
            </div>

            <div *ngIf="error" class="alert alert-danger">{{ error }}</div>
            <div *ngIf="success" class="alert alert-success">
                ¡Registro exitoso! Redirigiendo al login...
            </div>

            <button type="submit" [disabled]="loading || registroForm.invalid" class="btn btn-primary btn-block">
                {{ loading ? 'Registrando...' : 'Crear Cuenta' }}
            </button>
        </form>

        <div class="registro-footer">
            <a (click)="goToLogin()" class="link">¿Ya tienes cuenta? Inicia sesión</a>
        </div>
    </div>
</div>
