<main class="login-page">

    <app-auth-landing-bg />

    <!-- LOGIN CONTAINER -->

    <section class="login-wrapper">

        <!-- BRAND HEADER -->

        <header class="brand-header">

            <img [src]="logoSrc" alt="Logo Universidad del Quindío" class="logo">

            <p class="brand-subtitle">
                Universidad del Quindío
            </p>

            <h1>
                Sistema de Triage Académico
            </h1>

        </header>

        <!-- GLASS CARD -->

        <div class="login-card">

            <div class="login-header">

                <div class="icon-wrapper">

                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.8"
                        stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round"
                            d="M9 12.75 11.25 15 15 9.75M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z" />
                    </svg>

                </div>

                <h2>
                    Inicio de sesión
                </h2>

                <p>
                    Accede a tu expediente académico y servicios institucionales.
                </p>

            </div>

            <div *ngIf="errorMessage" class="alert-error" role="alert">
                {{ errorMessage }}
            </div>

            <form [formGroup]="form" (ngSubmit)="onSubmit()" class="login-form">

                <!-- EMAIL -->

                <div class="input-group">

                    <label for="email">
                        Correo institucional
                    </label>

                    <input id="email" type="email" formControlName="email" placeholder="usuario@uniquindio.edu.co">

                    <small *ngIf="email?.invalid && email?.touched">
                        Ingresa un correo válido
                    </small>

                </div>

                <!-- PASSWORD -->

                <div class="input-group">

                    <div class="password-header">

                        <label for="password">
                            Contraseña
                        </label>

                        <button type="button" class="toggle-password" (click)="togglePassword()">
                            {{ showPassword ? 'Ocultar' : 'Mostrar' }}
                        </button>

                    </div>

                    <input id="password" [type]="showPassword ? 'text' : 'password'" formControlName="password"
                        placeholder="••••••••">

                    <small *ngIf="password?.invalid && password?.touched">
                        La contraseña es obligatoria
                    </small>

                </div>

                <!-- OPTIONS -->

                <div class="login-options">

                    <label class="remember">

                        <input type="checkbox" formControlName="remember">

                        <span>
                            Recordarme
                        </span>

                    </label>

                    <a href="#">
                        ¿Olvidaste tu contraseña?
                    </a>

                </div>

                <!-- BUTTON -->

                <button type="submit" class="login-button" [disabled]="loading">
                    {{ loading ? 'Ingresando...' : 'Ingresar al sistema' }}
                </button>

            </form>

            <!-- FOOTER -->

            <div class="register-section">

                <p>
                    ¿No tienes una cuenta?

                    <a routerLink="/registro">
                        Registrarse
                    </a>
                </p>

            </div>

        </div>

    </section>

</main>
