<div class="dashboard-container">
    <div class="welcome-section">
        <h1>¡Bienvenido, {{ currentUser?.nombre }}!</h1>
        <p class="role">Rol: <strong>{{ getRolNombre() }}</strong></p>
    </div>

    <div class="stats-grid">
        <div class="stat-card">
            <h3>Total Solicitudes</h3>
            <div class="stat-number">{{ stats.totalSolicitudes }}</div>
        </div>
        <div class="stat-card warning">
            <h3>Pendientes</h3>
            <div class="stat-number">{{ stats.pendientes }}</div>
        </div>
        <div class="stat-card">
            <h3>En Atención</h3>
            <div class="stat-number">{{ stats.enAtencion }}</div>
        </div>
        <div class="stat-card danger">
            <h3>Críticas</h3>
            <div class="stat-number">{{ stats.criticas }}</div>
        </div>
    </div>

    <div class="quick-actions">
        <h2>Acciones Rápidas</h2>
        <div class="actions-grid">
            <button routerLink="/solicitudes" class="action-btn primary">
                📋 Ver Todas las Solicitudes
            </button>
            <button routerLink="/solicitudes/crear" class="action-btn">
                ➕ Nueva Solicitud
            </button>
        </div>
    </div>
</div>
